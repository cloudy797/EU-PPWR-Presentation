name: Build Marp Slides

on:
  push:
    branches:
      - main

jobs:
  marp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: marp-team/marp-cli-action@v3
        with:
          files: .
          output: output

      - uses: actions/upload-artifact@v4
        with:
          name: slides
          path: output
