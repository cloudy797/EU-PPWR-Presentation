name: Build Marp Slides

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Create output folder
        run: mkdir -p output

      - name: Generate HTML
        run: marp EU_PPWR_2025.md -o output/EU_PPWR_2025.html

      - name: Generate PDF
        run: marp --pdf EU_PPWR_2025.md -o output/EU_PPWR_2025.pdf

      - name: Generate PPTX
        run: marp --pptx EU_PPWR_2025.md -o output/EU_PPWR_2025.pptx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slides
          path: output/
